<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Никита | Контакт</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #ffcc00;
            --card-bg: #111111;
        }

        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .qr-card {
            background: var(--card-bg);
            padding: 40px 20px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid #222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8);
            max-width: 320px;
            width: 100%;
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .subtitle {
            color: var(--accent);
            font-size: 0.8rem;
            font-weight: 700;
            margin-bottom: 30px;
            display: block;
        }

        .qr-container {
            background: #fff;
            padding: 15px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 25px;
        }

        .qr-container img {
            display: block;
            width: 220px;
            height: 220px;
        }

        .instruction {
            font-size: 0.9rem;
            color: #666;
            line-height: 1.4;
        }

        .address {
            margin-top: 20px;
            font-size: 0.75rem;
            color: #444;
        }
    </style>
</head>
<body>

    <div class="qr-card">
        <h1>НИКИТА</h1>
        <span class="subtitle">АВАРИЙНЫЙ КОМИССАР</span>

        <div class="qr-container">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=BEGIN%3AVCARD%0AVERSION%3A3.0%0AFN%3A%D0%9D%D0%B8%D0%BA%D0%B8%D1%82%D0%B0%20%D0%90%D0%B2%D0%B0%D1%80%D0%BA%D0%BE%D0%BC%0ATEL%3BTYPE%3DCELL%3A%2B79518703934%0ANOTE%3ATelegram%3A%20%40blatsphera%0AADR%3A%3B%3B%D0%90%D0%BD%D1%82%D0%BE%D0%BD%D0%BE%D0%B2%D0%B0-%D0%9E%D0%B2%D1%81%D0%B8%D0%B5%D0%BD%D0%BA%D0%BE%207%3B%D0%92%D0%BE%D1%80%D0%BE%D0%BD%D0%B5%D0%B6%3B%3B%3B%0AEND%3AVCARD" alt="Добавить контакт">
        </div>

        <p class="instruction">Наведите камеру,<br>чтобы сохранить мой контакт</p>
        
        <div class="address">Антонова-Овсеенко, 7</div>
    </div>

</body>
</html>
