<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EXPERT | Аварийный Комиссар</title>
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0a0c;
            --panel-bg: #141417;
            --accent: #007AFF; /* Apple Blue */
            --border: #2c2c2e;
            --text-primary: #f5f5f7;
            --text-secondary: #86868b;
            --input-bg: #1c1c1e;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-primary);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .app-wrapper {
            width: 100%;
            max-width: 480px;
            padding: 24px;
            box-sizing: border-box;
        }

        /* Шапка в стиле Expert */
        .expert-header {
            border-left: 3px solid var(--accent);
            padding-left: 15px;
            margin-bottom: 40px;
            margin-top: 20px;
        }

        .expert-header h1 {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .expert-header .status {
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            color: var(--accent);
            margin-top: 5px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status::before {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px var(--accent);
        }

        /* Карточка формы */
        .expert-panel {
            background: var(--panel-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
        }

        .form-section-title {
            font-size: 10px;
            font-weight: 700;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 20px;
            display: block;
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .input-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        input, select {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 14px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--accent);
        }

        /* Кнопка */
        .btn-expert {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 18px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-expert:active {
            transform: scale(0.97);
            background: #0056b3;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 30px;
            font-family: 'JetBrains Mono', monospace;
        }

        /* Идентификатор протокола */
        #protocolID {
            color: var(--text-primary);
        }
    </style>
</head>
<body>

<div class="app-wrapper">
    <div class="expert-header">
        <h1>Expert Protocol</h1>
        <div class="status">SYSTEM ONLINE | ID: <span id="protocolID"></span></div>
    </div>

    <div class="expert-panel">
        <span class="form-section-title">Данные экспертизы</span>
        
        <form id="expertForm">
            <div class="input-group">
                <label>ФИО КЛИЕНТА</label>
                <input type="text" id="name" placeholder="Введите полностью" required>
            </div>

            <div class="input-group">
                <label>ТРАНСПОРТНОЕ СРЕДСТВО / ГОСНОМЕР</label>
                <input type="text" id="car" placeholder="Марка, модель, номер" required>
            </div>

            <div class="input-group">
                <label>ДАТА И ВРЕМЯ ОСМОТРА</label>
                <input type="datetime-local" id="date" required>
            </div>

            <div class="input-group">
                <label>КОНТАКТНЫЙ НОМЕР</label>
                <input type="tel" id="phone" placeholder="+7" required>
            </div>

            <button type="submit" class="btn-expert">Сформировать протокол</button>
        </form>
    </div>

    <div class="footer-note">
        OFFICIAL DISPATCHER NOTIFICATION SYSTEM
    </div>
</div>

<script>
    // Генерация случайного ID протокола для солидности
    document.getElementById('protocolID').innerText = 'EXP-' + Math.floor(Math.random() * 9000 + 1000);

    document.getElementById('expertForm').addEventListener('submit', function(e) {
        e.preventDefault();

        const name = document.getElementById('name').value;
        const car = document.getElementById('car').value;
        const dateRaw = document.getElementById('date').value;
        const phone = document.getElementById('phone').value;
        const pID = document.getElementById('protocolID').innerText;

        const date = new Date(dateRaw).toLocaleString('ru-RU', {
            day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
        });

        // Текст сообщения
        const text = `⚠️ СФОРМИРОВАН ПРОТОКОЛ ОСМОТРА: ${pID}%0A%0A` +
                     `👤 Клиент: ${name}%0A` +
                     `🚗 Авто: ${car}%0A` +
                     `📅 Назначен осмотр: ${date}%0A` +
                     `📞 Тел: ${phone}%0A%0A` +
                     `Ирина, подтвердите запись звонком. Данные внесены в базу.`;

        const tgLink = `https://t.me/Irishka_0923?text=${text}`;

        // Эффект нажатия
        const btn = e.submitter;
        btn.innerText = "РЕГИСТРАЦИЯ...";
        
        setTimeout(() => {
            window.location.href = tgLink;
            btn.innerText = "Сформировать протокол";
        }, 600);
    });
</script>

</body>
</html>
