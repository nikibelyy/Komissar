<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аварком Никита — Воронеж</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .vcard {
            width: 100%;
            max-width: 400px;
            padding: 30px;
            text-align: center;
            background: linear-gradient(145deg, #1a1a1a, #000);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(255, 215, 0, 0.1);
        }
        .status {
            display: inline-block;
            background: #28a745;
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        h1 {
            font-size: 28px;
            margin: 10px 0;
            color: #ffd700; /* Золотой/Желтый акцент */
        }
        .subtitle {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
        }
        .services {
            text-align: left;
            background: #111;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
        }
        .services-item {
            margin: 10px 0;
            font-size: 14px;
            display: flex;
            align-items: center;
        }
        .services-item::before {
            content: "✓";
            color: #ffd700;
            margin-right: 10px;
            font-weight: bold;
        }
        .call-btn {
            display: block;
            background: #ffd700;
            color: #000;
            text-decoration: none;
            padding: 18px;
            border-radius: 50px;
            font-size: 20px;
            font-weight: bold;
            transition: transform 0.2s;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }
        .call-btn:active {
            transform: scale(0.95);
        }
        .whatsapp-btn {
            display: inline-block;
            margin-top: 20px;
            color: #25d366;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="vcard">
    <div class="status">● На связи 24/7</div>
    <h1>АВАРКОМ НИКИТА</h1>
    <div class="subtitle">Воронеж и область</div>

    <div class="services">
        <div class="services-item">Оформление ДТП по Европротоколу</div>
        <div class="services-item">Независимая фотофиксация</div>
        <div class="services-item">Помощь при разногласиях</div>
        <div class="services-item">Юридическая поддержка (Суды)</div>
    </div>

    <a href="tel:+79518703934" class="call-btn">ВЫЗВАТЬ НА МЕСТО</a>
    
    <a href="https://wa.me/79518703934" class="whatsapp-btn">Написать в WhatsApp</a>
</div>

</body>
</html>
