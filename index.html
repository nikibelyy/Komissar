<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Перекуп ЛТД</title>
    <!-- Подключаем скрипт Телеграма -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            background-color: #1c1c1e;
            color: #ffffff;
            margin: 0;
            padding: 15px;
        }
        .header {
            text-align: center;
            padding: 10px 0;
            border-bottom: 1px solid #3a3a3c;
        }
        .header h1 { color: #34c759; margin: 0; font-size: 24px; }
        .card {
            background: #2c2c2e;
            border-radius: 12px;
            padding: 15px;
            margin-top: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .card img {
            width: 100%;
            border-radius: 8px;
            object-fit: cover;
        }
        .price { font-size: 20px; font-weight: bold; color: #34c759; margin: 10px 0 5px 0; }
        .old-price { text-decoration: line-through; color: #8e8e93; font-size: 14px; }
        .btn {
            display: block;
            width: 100%;
            background: #34c759;
            color: #fff;
            text-align: center;
            padding: 12px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: bold;
            margin-top: 10px;
            border: none;
            cursor: pointer;
        }
        .btn-sell { background: #ff9500; }
    </style>
</head>
<body>

    <div class="header">
        <h1>ПЕРЕКУП • AUTO</h1>
        <p style="color: #8e8e93; margin: 5px 0 0 0;">Только низ рынка 🔥</p>
    </div>

    <!-- Пример карточки товара -->
    <div class="card">
        <img src="https://via.placeholder.com/400x250" alt="BMW 5">
        <h3>BMW 5 серии, 2019</h3>
        <div class="old-price">Рынок: 3 800 000 ₽</div>
        <div class="price">Наша цена: 2 950 000 ₽</div>
        <p>Пробег: 85 000 км. Родной окрас, срочно! Юр. чистая.</p>
        <button class="btn" onclick="buyAuto('BMW 5')">Купить / Забронировать</button>
    </div>

    <!-- Кнопка для выкупа -->
    <div style="margin-top: 25px;">
        <button class="btn btn-sell" onclick="openSellForm()">💰 Предложить авто под выкуп</button>
    </div>

    <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Разворачиваем на весь экран

        function buyAuto(model) {
            tg.sendData(JSON.stringify({action: "buy", model: model}));
            tg.close(); // Закрываем окно после действия
        }

        function openSellForm() {
            // Здесь в будущем будет переход на форму отправки данных о своей машине
            alert("Тут откроется форма: Марка, Год, Фото, Цена");
        }
    </script>
</body>
</html>
