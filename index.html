<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MBD 136</title>
    <!-- Официальный скрипт Telegram WebApp -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #090d16;
            --card-bg: rgba(22, 28, 45, 0.4);
            --card-hover: rgba(22, 28, 45, 0.7);
            --accent-color: #4f46e5;
            --accent-gradient: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: rgba(255, 255, 255, 0.06);
            --border-active: rgba(99, 102, 241, 0.4);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: -10%;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 400px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.12) 0%, transparent 70%);
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 460px;
            width: 100%;
            margin: 0 auto;
            padding: 28px 20px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
            animation: fadeInDown 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo-box {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 64px;
            height: 64px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 18px;
            margin-bottom: 16px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .logo-icon {
            font-size: 28px;
        }

        .title {
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(180deg, #ffffff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 400;
        }

        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
            animation: fadeInUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) 0.1s backwards;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        .card:hover {
            background: var(--card-hover);
            border-color: rgba(255, 255, 255, 0.12);
            transform: translateY(-2px);
        }

        .card.active {
            border-color: var(--border-active);
            background: rgba(99, 102, 241, 0.08);
            box-shadow: 0 12px 30px rgba(79, 70, 229, 0.15), inset 0 0 0 1px rgba(99, 102, 241, 0.2);
            transform: scale(0.98);
        }

        .card-icon {
            font-size: 24px;
            margin-bottom: 14px;
            display: inline-block;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .card.active .card-icon {
            transform: scale(1.15);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.2px;
        }

        .card-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }

        /* Интерактивный блок с инпутом и кнопкой запуска */
        .dynamic-action-block {
            display: none; 
            opacity: 0;
            transform: translateY(15px);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .dynamic-action-block.show {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        .input-box {
            margin-bottom: 12px;
        }

        .input-box input {
            width: 100%;
            background: rgba(13, 18, 30, 0.7);
            border: 1px solid var(--border-color);
            padding: 18px;
            border-radius: 18px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            text-align: center;
            backdrop-filter: blur(10px);
        }

        .input-box input:focus {
            border-color: rgba(99, 102, 241, 0.5);
            background: rgba(13, 18, 30, 0.9);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .main-btn {
            background: var(--accent-gradient);
            color: #ffffff;
            border: none;
            padding: 18px 24px;
            font-size: 15px;
            font-weight: 600;
            border-radius: 18px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .main-btn:hover {
            box-shadow: 0 12px 30px rgba(79, 70, 229, 0.45);
            transform: translateY(-1px);
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); filter: blur(5px); }
            to { opacity: 1; transform: translateY(0); filter: blur(0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div class="logo-box">
                <div class="logo-icon">🔮</div>
            </div>
            <h1 class="title">MBD 136</h1>
            <p class="subtitle">Выберите категорию для начала поиска</p>
        </div>

        <div class="search-grid">
            <div class="card" onclick="selectType(this, 'Номер телефона', 'Введите номер телефона...')">
                <div class="card-icon">📱</div>
                <div class="card-title">Телефон</div>
                <div class="card-desc">Поиск связанных аккаунтов, объявлений и тегов</div>
            </div>

            <div class="card" onclick="selectType(this, 'Номер авто', 'Введите госномер авто...')">
                <div class="card-icon">🚗</div>
                <div class="card-title">Автомобиль</div>
                <div class="card-desc">Проверка владельца, СТС и истории штрафов</div>
            </div>

            <div class="card" onclick="selectType(this, 'ФИО / Паспорт', 'Введите ФИО или серию/номер...')">
                <div class="card-icon">👤</div>
                <div class="card-title">ФИО / Паспорт</div>
                <div class="card-desc">Поиск имущества, задолженностей и связей</div>
            </div>

            <div class="card" onclick="selectType(this, 'Соцсети / Email', 'Введите юзернейм или почту...')">
                <div class="card-icon">🌐</div>
                <div class="card-title">Аккаунты</div>
                <div class="card-desc">Анализ утечек паролей и цифрового следа</div>
            </div>
        </div>

        <!-- Появляется только после выбора карточки -->
        <div class="dynamic-action-block" id="actionBlock">
            <div class="input-box">
                <input type="text" id="targetInput" placeholder="">
            </div>
            <button class="main-btn" onclick="startSearch()">Отправить запрос</button>
        </div>
    </div>

    <script>
        let selectedCategory = "";
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) {
            tg.ready();
            tg.expand(); 
        }

        function selectType(element, category, placeholder) {
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');

            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            selectedCategory = category;
            
            const actionBlock = document.getElementById('actionBlock');
            const targetInput = document.getElementById('targetInput');
            
            actionBlock.style.display = 'block';
            setTimeout(() => { actionBlock.classList.add('show'); }, 10);
            
            targetInput.placeholder = placeholder;
            targetInput.focus();
        }

        function startSearch() {
            const inputVal = document.getElementById('targetInput').value.trim();

            if (!selectedCategory || !inputVal) {
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
                return;
            }

            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');

            const resultData = {
                category: selectedCategory,
                value: inputVal
            };

            if (tg) {
                tg.sendData(JSON.stringify(resultData));
            } else {
                alert("Отправлено: " + JSON.stringify(resultData));
            }
        }
    </script>
</body>
</html>
