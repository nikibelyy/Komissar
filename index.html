<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Чудо Авто</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --bg: #0f0f11; --red: #d90429; --text: #ffffff; --input: #232329; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; padding-bottom: 100px; }
        .screen { display: none; padding: 20px; }
        .active { display: block; }
        .input { width: 100%; background: var(--input); border: none; padding: 15px; margin: 10px 0; border-radius: 10px; color: white; }
        .btn { width: 100%; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #tab-admin { display: none; }
        .nav { position: fixed; bottom: 0; width: 100%; display: flex; background: #1c1c21; padding: 15px; justify-content: space-around; }
        .car-card { background: #1c1c21; padding: 15px; margin-bottom: 15px; border-radius: 15px; }
    </style>
</head>
<body>

<div id="scr-catalog" class="screen active">
    <h1>В наличии</h1>
    <div id="catalog-list"></div>
</div>

<div id="scr-sell" class="screen">
    <h1>Оценка авто</h1>
    <form id="sellForm">
        <input type="text" id="s-model" class="input" placeholder="Марка, Модель, Год" required>
        <input type="number" id="s-price" class="input" placeholder="Желаемая цена" required>
        <input type="text" id="s-contact" class="input" placeholder="@твой_телеграм" required>
        <button type="submit" class="btn">ОТПРАВИТЬ НА ОЦЕНКУ</button>
    </form>
</div>

<div id="scr-admin" class="screen">
    <h1>Админ Панель</h1>
    <form id="addCarForm">
        <input type="text" id="a-title" class="input" placeholder="Название авто" required>
        <input type="file" id="a-photos" class="input" multiple accept="image/*" required>
        <input type="text" id="a-meta" class="input" placeholder="Описание" required>
        <input type="number" id="a-price" class="input" placeholder="Цена для своих" required>
        <input type="number" id="a-market" class="input" placeholder="Рыночная цена" required>
        <button type="submit" class="btn">ОПУБЛИКОВАТЬ ЛОТ</button>
    </form>
</div>

<div class="nav">
    <div onclick="switchTab('catalog')">Каталог</div>
    <div onclick="switchTab('sell')">Выкуп</div>
    <div id="tab-admin" onclick="switchTab('admin')">Админка</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();
    
    // Твой ID как строка
    const ADMIN_ID = "7523840597";
    const userTgId = tg.initDataUnsafe?.user?.id ? String(tg.initDataUnsafe.user.id) : "";
    
    if (userTgId === ADMIN_ID) {
        document.getElementById('tab-admin').style.display = 'block';
    }

    function switchTab(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('scr-' + id).classList.add('active');
    }

    // Загрузка авто
    document.getElementById('addCarForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append("title", document.getElementById('a-title').value);
        formData.append("meta", document.getElementById('a-meta').value);
        formData.append("price", document.getElementById('a-price').value);
        formData.append("market", document.getElementById('a-market').value);
        const files = document.getElementById('a-photos').files;
        for(let i=0; i<files.length; i++) formData.append("files", files[i]);

        await fetch('/api/add_car', { method: 'POST', body: formData });
        alert("Успешно добавлено!");
        location.reload();
    };

    // Отправка заявки на выкуп
    document.getElementById('sellForm').onsubmit = async (e) => {
        e.preventDefault();
        const data = {
            model: document.getElementById('s-model').value,
            price: document.getElementById('s-price').value,
            contact: document.getElementById('s-contact').value
        };
        await fetch('/api/buyback', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        alert("Заявка принята!");
        switchTab('catalog');
    };

    // Рендер каталога
    async function loadCars() {
        const res = await fetch('/api/cars');
        const cars = await res.json();
        const list = document.getElementById('catalog-list');
        list.innerHTML = cars.map(car => `
            <div class="car-card">
                <h3>${car.title}</h3>
                <p>${car.meta}</p>
                <p>Цена: ${car.price} ₽</p>
                ${userTgId === ADMIN_ID ? `<button class="btn" style="background:#444" onclick="deleteCar(${car.id})">Удалить</button>` : ''}
            </div>
        `).join('');
    }
    
    async function deleteCar(id) {
        await fetch('/api/cars/' + id, { method: 'DELETE' });
        loadCars();
    }

    loadCars();
</script>
</body>
</html>
