<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GIBDD Registry</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="data:application/json;base64,ewogICJuYW1lIjogIkdJQkREIFJlZ2lzdHJ5IiwKICAic2hvcnRfbmFtZSI6ICJSZWdpc3RyeSIsCiAgInN0YXJ0X3VybCI6ICIuIiwKICAiZGlzcGxheSI6ICJzdGFuZGFsb25lIiwKICAiYmFja2dyb3VuZF9jb2xvciI6ICIjZjNmNGY2IiwKICAidGhlbWVfY29sb3IiOiAiIzI1NjNmZSIsCiAgImljb25zIjogW3sgInNyYyI6ICJodHRwczovL2Nkbi1pY29ucy1wbmcuZmxhdGljb24uY29tLzUxMi8yOTkxLzI5OTExMjQucG5nIiwgInR5cGUiOiAiaW1hZ2UvcG5nIiwgInNpemVzIjogIjUxMng1MTIiIH1dCn0=">
    
    <style>
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .ios-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <header class="sticky top-0 z-50 glass-card border-b border-slate-200 px-6 py-4">
        <div class="max-w-md mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800">Реестр ГАИ</h1>
            <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold">
                ID
            </div>
        </div>
    </header>

    <main class="max-w-md mx-auto p-6 space-y-6">
        <section class="bg-white rounded-3xl p-6 ios-shadow border border-slate-100">
            <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider mb-4">Новая запись</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-medium text-slate-500 ml-1 mb-1">Госномер</label>
                    <input type="text" id="plateInput" placeholder="А 000 АА 00" 
                        class="w-full bg-slate-100 border-none rounded-2xl px-4 py-3 text-lg font-bold tracking-widest focus:ring-2 focus:ring-blue-500 transition-all outline-none">
                </div>
                <div>
                    <label class="block text-xs font-medium text-slate-500 ml-1 mb-1">Комментарий</label>
                    <textarea id="commentInput" rows="2" placeholder="Опишите ситуацию..." 
                        class="w-full bg-slate-100 border-none rounded-2xl px-4 py-3 text-sm focus:ring-2 focus:ring-blue-500 transition-all outline-none"></textarea>
                </div>
                <button onclick="addEntry()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-4 rounded-2xl transition-all active:scale-95 shadow-lg shadow-blue-200">
                    Сохранить в базу
                </button>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">История записей</h2>
                <span id="count" class="text-xs font-bold bg-slate-200 px-2 py-1 rounded-full text-slate-600">0</span>
            </div>
            <div id="entryList" class="space-y-3">
                </div>
        </section>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 glass-card border-t border-slate-200 py-3 px-10 flex justify-around items-center">
        <button class="text-blue-600"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path></svg></button>
        <button class="text-slate-400" onclick="alert('Функция поиска в разработке')"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg></button>
    </nav>

    <script>
        // Сохранение данных в LocalStorage, чтобы ничего не пропадало
        let entries = JSON.parse(localStorage.getItem('gibdd_db')) || [];

        function renderEntries() {
            const list = document.getElementById('entryList');
            const count = document.getElementById('count');
            list.innerHTML = '';
            count.innerText = entries.length;

            entries.slice().reverse().forEach((entry, index) => {
                const div = document.createElement('div');
                div.className = 'bg-white p-4 rounded-2xl border border-slate-100 ios-shadow animate-fade-in-up';
                div.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <span class="text-lg font-black tracking-tighter text-slate-800">${entry.plate.toUpperCase()}</span>
                        <span class="text-[10px] text-slate-400">${entry.date}</span>
                    </div>
                    <p class="text-sm text-slate-600 leading-relaxed">${entry.comment}</p>
                    <button onclick="deleteEntry(${entries.length - 1 - index})" class="mt-3 text-xs text-red-400 font-medium">Удалить</button>
                `;
                list.appendChild(div);
            });
            localStorage.setItem('gibdd_db', JSON.stringify(entries));
        }

        function addEntry() {
            const plate = document.getElementById('plateInput').value;
            const comment = document.getElementById('commentInput').value;

            if (!plate || !comment) return alert('Заполните все поля');

            const newEntry = {
                plate: plate,
                comment: comment,
                date: new Date().toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' })
            };

            entries.push(newEntry);
            renderEntries();

            // Очистка полей
            document.getElementById('plateInput').value = '';
            document.getElementById('commentInput').value = '';
        }

        function deleteEntry(index) {
            if(confirm('Удалить запись?')) {
                entries.splice(index, 1);
                renderEntries();
            }
        }

        // Регистрация Service Worker для PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(() => {
                console.log("Service Worker не зарегистрирован (нужен HTTPS или localhost)");
            });
        }

        renderEntries();
    </script>
</body>
</html>
