<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Аварийный Комиссар | Никита</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #121212;
            --card-bg: #1e1e1e;
            --accent-color: #e63946; /* Красный для экстренных служб */
            --tg-color: #0088cc;
            --text-color: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100-vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        /* Анимация появления */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .profile-img {
            width: 120px;
            height: 120px;
            background: linear-gradient(45deg, var(--accent-color), #f1faee);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 50px;
            box-shadow: 0 10px 20px rgba(230, 57, 70, 0.3);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .status {
            color: var(--accent-color);
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 30px;
            display: block;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            padding: 18px;
            border-radius: 15px;
            margin-bottom: 15px;
            font-weight: 700;
            transition: all 0.3s ease;
            font-size: 1.1rem;
        }

        /* Пульсирующая кнопка вызова */
        .btn-call {
            background-color: var(--accent-color);
            box-shadow: 0 5px 15px rgba(230, 57, 70, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(230, 57, 70, 0); }
            100% { box-shadow: 0 0 0 0 rgba(230, 57, 70, 0); }
        }

        .btn-tg {
            background-color: var(--tg-color);
            box-shadow: 0 5px 15px rgba(0, 136, 204, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        .info-text {
            margin-top: 30px;
            font-size: 0.85rem;
            opacity: 0.7;
            line-height: 1.5;
        }

        .qr-placeholder {
            margin-top: 40px;
            padding: 20px;
            border: 1px dashed #444;
            border-radius: 15px;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile-img">🚔</div>
        <h1>НИКИТА</h1>
        <span class="status">Аварийный Комиссар</span>

        <a href="tel:+79518703934" class="btn btn-call">
            📞 ПОЗВОНИТЬ СЕЙЧАС
        </a>

        <a href="https://t.me/blatsphera" target="_blank" class="btn btn-tg">
            ✈️ НАПИСАТЬ В TELEGRAM
        </a>

        <div class="info-text">
            Помощь при ДТП, оформление европротокола, <br> консультация на месте. Работаю 24/7.
        </div>

        <div class="qr-placeholder">
            Здесь будет ваш QR-код для быстрой передачи контактов
        </div>
    </div>

</body>
</html>
