<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expert CRM | Аварийный Комиссар</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --card-bg: rgba(28, 28, 30, 0.7);
            --accent-color: #3e64ff;
            --text-main: #ffffff;
            --text-secondary: #8e8e93;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, #1c1c1e, #000000);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: -0.5px;
            margin: 0;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 14px;
            margin-top: 8px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-secondary);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input, select, textarea {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 14px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-color);
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-submit {
            width: 100%;
            background: var(--text-main);
            color: black;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s active;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        /* Анимация появления */
        .fade-in {
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .tesla-logo {
            width: 40px;
            margin-bottom: 15px;
            filter: invert(1);
        }
    </style>
</head>
<body>

<div class="app-container fade-in">
    <div class="glass-card">
        <div class="header">
            <div style="font-size: 32px; margin-bottom: 10px;">◈</div>
            <h1>EXPERT CONTROL</h1>
            <p>Регистрация осмотра и фиксация данных</p>
        </div>

        <form id="crmForm">
            <div class="form-group">
                <label>ФИО Клиента</label>
                <input type="text" id="clientName" placeholder="Иван Иванов" required>
            </div>

            <div class="form-group">
                <label>Автомобиль и Госномер</label>
                <input type="text" id="carInfo" placeholder="Tesla Model 3 | A000AA" required>
            </div>

            <div class="form-group">
                <label>Дата и время осмотра</label>
                <input type="datetime-local" id="visitDate" required>
            </div>

            <div class="form-group">
                <label>Контактный телефон</label>
                <input type="tel" id="clientPhone" placeholder="+7 (___) ___-__-__" required>
            </div>

            <button type="submit" class="btn-submit">ПОДТВЕРДИТЬ ЗАПИСЬ</button>
        </form>
    </div>
</div>

<script>
    document.getElementById('crmForm').addEventListener('submit', function(e) {
        e.preventDefault();

        // Сбор данных
        const name = document.getElementById('clientName').value;
        const car = document.getElementById('carInfo').value;
        const dateRaw = document.getElementById('visitDate').value;
        const phone = document.getElementById('clientPhone').value;

        // Форматирование даты
        const date = new Date(dateRaw).toLocaleString('ru-RU', {
            day: 'numeric',
            month: 'long',
            year: 'numeric',
            hour: '2-digit',
            minute: '2-digit'
        });

        // Текст сообщения для Иришки
        const message = `НОВАЯ ЗАПИСЬ НА ОСМОТР%0A%0A` +
            `👤 Клиент: ${name}%0A` +
            `🚗 Авто: ${car}%0A` +
            `📅 Дата осмотра: ${date}%0A` +
            `📞 Телефон: ${phone}%0A%0A` +
            `Иришка, пожалуйста, позвони клиенту для подтверждения.`;

        // Ссылка на Telegram (открывает чат с готовым текстом)
        const telegramUrl = `https://t.me/Irishka_0923?text=${message}`;

        // Эффект нажатия и переход
        const btn = e.submitter;
        btn.innerText = "ОТПРАВКА...";
        btn.style.opacity = "0.7";

        setTimeout(() => {
            window.location.href = telegramUrl;
            btn.innerText = "ПОДТВЕРДИТЬ ЗАПИСЬ";
            btn.style.opacity = "1";
        }, 800);
    });
</script>

</body>
</html>
