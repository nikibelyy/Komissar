<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Панель Перекупа</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: Arial; padding: 15px; }
        h1 { color: #d90429; border-bottom: 1px solid #333; padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: #fff; border-radius: 5px; box-sizing: border-box;}
        button { background: #d90429; color: #fff; padding: 12px; width: 100%; border: none; border-radius: 5px; font-weight: bold; margin-bottom: 10px; cursor:pointer;}
        .btn-secondary { background: #333; }
        .car-item { background: #1a1a1a; padding: 10px; margin-bottom: 10px; border-left: 4px solid #d90429;}
    </style>
</head>
<body>
    <h1>Управление гаражом</h1>
    
    <div class="form-group">
        <h3>Добавить тачку</h3>
        <input type="text" id="title" placeholder="Марка, модель, год (напр. Toyota Camry, 2020)">
        <input type="number" id="price" placeholder="Цена (₽)">
        <textarea id="desc" rows="3" placeholder="Описание (Не бит, не крашен...)"></textarea>
        <!-- Поле для нескольких фото -->
        <label>Фотографии (можно выбрать несколько):</label>
        <input type="file" id="photos" multiple accept="image/*">
        
        <button onclick="uploadCar()" style="margin-top: 10px;">Выложить объявление</button>
    </div>

    <hr style="border-color: #333; margin: 20px 0;">

    <h3>Активные объявления</h3>
    <div id="admin-cars-list">
        <!-- Пример -->
        <div class="car-item">
            <strong>BMW X5, 2019</strong> - 4 500 000 ₽
            <button class="btn-secondary" style="margin-top: 10px;" onclick="tg.showAlert('Машина снята с продажи')">Снять с продажи / Удалить</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // Проверка безопасности: если открыл не админ, закрываем
        // ВАЖНО: Настоящая проверка должна быть на бэкенде, но для визуала делаем тут
        const ADMIN_ID = 7523840597; // ТВОЙ ID
        if(tg.initDataUnsafe.user && tg.initDataUnsafe.user.id !== ADMIN_ID) {
            document.body.innerHTML = "<h2 style='color:red; text-align:center;'>ДОСТУП ЗАПРЕЩЕН</h2>";
        }

        function uploadCar() {
            const title = document.getElementById('title').value;
            const files = document.getElementById('photos').files;
            
            if(!title || files.length === 0) {
                tg.showAlert("Укажи название и загрузи хотя бы 1 фото!");
                return;
            }
            
            // Здесь должна быть логика отправки FormData на бэкенд (/api/add_car)
            // Включающая загрузку файлов на сервер или в Telegram
            tg.showAlert(`Готово! Добавлено фото: ${files.length} шт.`);
        }
    </script>
</body>
</html>
