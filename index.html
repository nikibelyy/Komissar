<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Независимая Экспертиза</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
html{scroll-behavior:smooth;}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#000;color:white;line-height:1.6;overflow-x:hidden;}

/* NAVBAR */
nav{
position:fixed;top:0;width:100%;display:flex;justify-content:center;align-items:center;
padding:18px;background:rgba(0,0,0,0.7);backdrop-filter:blur(10px);z-index:100;
}
.logo{font-weight:600;font-size:20px;letter-spacing:1px;}

/* HERO */
.hero{
height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
text-align:center;padding:20px;position:relative;overflow:hidden;
background:linear-gradient(180deg,#000,#0a0a0a);
}
.hero::before{
content:"";position:absolute;top:0;left:0;width:100%;height:100%;
background:rgba(255,255,255,0.03);backdrop-filter:blur(2px);z-index:0;
}
.hero h1{
font-size:56px;font-weight:500;margin-bottom:20px;animation:fadeUp 1.2s ease;position:relative;z-index:1;
}
.hero p{
font-size:18px;max-width:600px;color:#d0d0d0;margin-bottom:40px;animation:fadeUp 1.5s ease;position:relative;z-index:1;
line-height:1.5;
}
.hero a{
padding:20px 50px;border-radius:50px;background:white;color:black;
font-size:20px;font-weight:600;text-decoration:none;transition:0.3s;position:relative;z-index:1;
}
.hero a:hover{transform:scale(1.05);box-shadow:0 10px 25px rgba(255,255,255,0.3);}

/* LIGHT EFFECT */
.hero::after{
content:"";position:absolute;top:-50%;left:-50%;width:200%;height:200%;
background:radial-gradient(circle at center, rgba(255,255,255,0.05), transparent 70%);
animation:moveLight 10s linear infinite;z-index:0;
}

@keyframes moveLight{
0%{transform:rotate(0deg);}
50%{transform:rotate(180deg);}
100%{transform:rotate(360deg);}
}

/* ANIMATIONS */
@keyframes fadeUp{
from{opacity:0;transform:translateY(30px);}
to{opacity:1;transform:translateY(0);}
}

/* MOBILE */
@media(max-width:700px){
.hero h1{font-size:38px;}
.hero p{font-size:16px;}
.hero a{font-size:18px;padding:16px 40px;}
}
</style>
</head>
<body>

<nav>
<div class="logo">Независимая Экспертиза</div>
</nav>

<section class="hero">
<h1>Независимая Экспертиза</h1>
<p>Мы проводим честные, качественные и профессиональные экспертизы. Работаем по репутации и с максимальной заботой о клиентах. Каждый отчет — прозрачный, точный и полностью объективный.</p>
<a href="tel:+79518703934">Позвонить эксперту +7 (951) 870-39-34</a>
</section>

</body>
</html>
