<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ДТП СЕРВИС</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ДТП СЕРВИС">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3202/3202927.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .ios-card { background: #1c1c1e; border-radius: 20px; }
        .btn-ios { background: #0a84ff; color: white; padding: 12px; border-radius: 12px; font-weight: 600; }
        /* Убираем подсветку при тапе на iOS */
        * { -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 pb-2">
        <h1 class="text-3xl font-bold tracking-tight">CRM Клиенты</h1>
    </header>

    <div class="px-6 grid grid-cols-2 gap-4 mb-6">
        <div class="ios-card p-4">
            <p class="text-gray-400 text-xs uppercase font-bold">Всего</p>
            <p class="text-2xl font-bold" id="count-all">0</p>
        </div>
        <button onclick="exportExcel()" class="ios-card p-4 flex flex-col items-center justify-center border border-blue-500/30">
            <i class="fa-solid fa-file-excel text-blue-500 text-xl mb-1"></i>
            <span class="text-[10px] font-bold uppercase">Экспорт Excel</span>
        </button>
    </div>

    <section class="px-6 mb-8">
        <div class="ios-card p-5 space-y-4">
            <input type="text" id="name" placeholder="ФИО Клиента" class="w-full bg-[#2c2c2e] p-3 rounded-xl outline-none">
            <input type="tel" id="phone" placeholder="Телефон" class="w-full bg-[#2c2c2e] p-3 rounded-xl outline-none">
            <button onclick="saveClient()" class="w-full btn-ios text-sm">Добавить клиента</button>
        </div>
    </section>

    <div id="clients-list" class="px-6 space-y-4"></div>

    <script>
        let clients = JSON.parse(localStorage.getItem('dtp_clients')) || [];

        function saveClient() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            if(!name || !phone) return alert('Заполните поля!');
            
            const newClient = { id: Date.now(), name, phone, date: new Date().toISOString() };
            clients.unshift(newClient);
            localStorage.setItem('dtp_clients', JSON.stringify(clients));
            render();
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
        }

        function render() {
            const list = document.getElementById('clients-list');
            document.getElementById('count-all').innerText = clients.length;
            list.innerHTML = clients.map(c => `
                <div class="ios-card p-4 flex justify-between items-center">
                    <div>
                        <p class="font-bold">${c.name}</p>
                        <p class="text-sm text-gray-400">${c.phone}</p>
                    </div>
                    <button onclick="del(${c.id})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
        }

        function exportExcel() {
            const month = new Date().getMonth();
            const filtered = clients.filter(c => new Date(c.date).getMonth() === month);
            const ws = XLSX.utils.json_to_sheet(filtered);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Клиенты");
            XLSX.writeFile(wb, "Клиенты_за_месяц.xlsx");
        }

        function del(id) {
            clients = clients.filter(c => c.id !== id);
            localStorage.setItem('dtp_clients', JSON.stringify(clients));
            render();
        }

        render();
    </script>
</body>
</html>
