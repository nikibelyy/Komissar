<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT SEARCH | Пробив</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg-color: #06080c;
            --panel-bg: rgba(15, 22, 36, 0.7);
            --accent-color: #00ff88;
            --accent-glow: rgba(0, 255, 136, 0.3);
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --border-color: rgba(255, 255, 255, 0.08);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background: radial-gradient(circle at top, #0f172a 0%, var(--bg-color) 70%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow-x: hidden;
        }

        /* Задний фон с технологичной сеткой */
        .bg-grid {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 136, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.02) 1px, transparent 1px);
            background-size: 30px 30px;
            pointer-events: none;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 2;
            max-width: 480px;
            width: 100%;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            margin-top: 10px;
            margin-bottom: 32px;
        }

        .logo-box {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 70px;
            height: 70px;
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid rgba(0, 255, 136, 0.2);
            border-radius: 20px;
            margin-bottom: 16px;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.1);
            animation: pulse 3s infinite alternate;
        }

        .logo-icon {
            font-size: 32px;
            line-height: 1;
        }

        .title {
            font-size: 20px;
            font-weight: 800;
            letter-spacing: 3px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 0%, #a5b4fc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
            font-weight: 500;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Сетка выбора категорий */
        .search-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 24px;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 20px 16px;
            text-align: left;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, transparent 100%);
            border-radius: 16px;
            pointer-events: none;
        }

        /* Активное состояние карточки */
        .card.active {
            border-color: var(--accent-color);
            background: rgba(0, 255, 136, 0.06);
            box-shadow: 0 0 20px var(--accent-glow), inset 0 0 12px rgba(0, 255, 136, 0.1);
            transform: translateY(-2px);
        }

        .card-icon {
            font-size: 24px;
            margin-bottom: 12px;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        
        .card.active .card-icon {
            transform: scale(1.1);
        }

        .card-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
        }

        .card-desc {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            line-height: 1.4;
        }

        /* Динамический блок (Инпут + Кнопка) */
        .dynamic-action-block {
            display: none; /* Скрыто до выбора карточки */
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .input-box {
            margin-bottom: 16px;
        }

        .input-box input {
            width: 100%;
            background: rgba(10, 15, 26, 0.8);
            border: 1px solid var(--border-color);
            padding: 16px;
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.25s ease;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .input-box input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
            background: rgba(10, 15, 26, 0.95);
        }

        .btn-box {
            margin-bottom: 20px;
        }

        .main-btn {
            background: var(--accent-color);
            color: #020617;
            border: none;
            padding: 16px 24px;
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.3);
            transition: all 0.2s ease;
        }

        .main-btn:hover {
            opacity: 0.95;
            box-shadow: 0 4px 25px rgba(0, 255, 136, 0.5);
            transform: translateY(-1px);
        }
        
        .main-btn:active {
            transform: translateY(1px);
        }

        /* Анимации */
        @keyframes pulse {
            0% { border-color: rgba(0, 255, 136, 0.2); box-shadow: 0 0 15px rgba(0, 255, 136, 0.05); }
            100% { border-color: rgba(0, 255, 136, 0.5); box-shadow: 0 0 25px rgba(0, 255, 136, 0.2); }
        }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
    </style>
</head>
<body>

    <div class="bg-grid"></div>

    <div class="container fade-in">
        <div class="header">
            <div class="logo-box">
                <div class="logo-icon">👁‍🗨</div>
            </div>
            <h1 class="title">EYE OF GOD ENGINE</h1>
            <p class="subtitle">Интеллектуальный поиск данных</p>
        </div>

        <div class="search-grid">
            <div class="card" onclick="selectType(this, 'Номер телефона', 'Пример: +79991234567')">
                <div class="card-icon">📱</div>
                <div class="card-title">Номер телефона</div>
                <div class="card-desc">Оператор, теги, объявления, соцсети</div>
            </div>

            <div class="card" onclick="selectType(this, 'Номер авто', 'Пример: А777АА777')">
                <div class="card-icon">🚗</div>
                <div class="card-title">Номер авто</div>
                <div class="card-desc">Владелец, СТС/ПТС, история штрафов</div>
            </div>

            <div class="card" onclick="selectType(this, 'ФИО / Паспорт', 'Пример: Иванов Иван Иванович')">
                <div class="card-icon">👤</div>
                <div class="card-title">ФИО / Паспорт</div>
                <div class="card-desc">Родственники, задолженности, суды</div>
            </div>

            <div class="card" onclick="selectType(this, 'Соцсети / Email', 'Пример: @username или mail@mail.ru')">
                <div class="card-icon">🌐</div>
                <div class="card-title">Соцсети / Email</div>
                <div class="card-desc">Связанные профили, утечки паролей</div>
            </div>
        </div>

        <div class="dynamic-action-block" id="actionBlock">
            <div class="input-box">
                <input type="text" id="targetInput" placeholder="Выберите тип пробива сверху">
            </div>

            <div class="btn-box">
                <button class="main-btn" onclick="startSearch()">Запустить Поиск</button>
            </div>
        </div>
    </div>

    <script>
        let selectedCategory = "";

        // Инициализация Telegram WebApp
        let tg = window.Telegram ? window.Telegram.WebApp : null;
        if (tg) {
            tg.ready();
            tg.expand(); 
        }

        // Логика выбора карточки
        function selectType(element, category, placeholder) {
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }

            // Сброс активного класса
            document.querySelectorAll('.card').forEach(c => c.classList.remove('active'));
            element.classList.add('active');

            selectedCategory = category;
            
            // Отображаем блок с инпутом и кнопкой
            const actionBlock = document.getElementById('actionBlock');
            const targetInput = document.getElementById('targetInput');
            
            actionBlock.style.display = 'block';
            targetInput.placeholder = placeholder;
            targetInput.value = "";
            targetInput.focus();
        }

        // Отправка данных
        function startSearch() {
            const inputVal = document.getElementById('targetInput').value.trim();

            if (!selectedCategory) {
                alert('Пожалуйста, выберите категорию!');
                return;
            }
            if (!inputVal) {
                alert('Пожалуйста, введите данные для поиска!');
                return;
            }

            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            const resultData = {
                category: selectedCategory,
                value: inputVal
            };

            if (tg) {
                tg.sendData(JSON.stringify(resultData));
            } else {
                alert("Отправка боту (тест): " + JSON.stringify(resultData));
            }
        }
    </script>
</body>
</html>
