<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ДТП СЕРВИС</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ДТП СЕРВИС">
    <meta name="theme-color" content="#050506">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body { 
            background-color: #050506; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            -webkit-user-select: none; user-select: none; /* Запрет выделения, как в приложении */
        }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select, textarea { -webkit-appearance: none; }
    </style>
</head>
<body class="pb-24">

    <div class="sticky top-0 z-50 glass px-5 py-4 flex justify-between items-center">
        <h1 class="text-xl font-bold">ДТП СЕРВИС</h1>
        <button onclick="exportToCSV()" class="text-red-500 font-bold text-sm"><i class="fa-solid fa-file-csv mr-1"></i> CSV</button>
    </div>

    <div class="px-4 py-4 space-y-6">
        <div class="grid grid-cols-3 gap-3">
            <div class="glass p-3 rounded-2xl text-center"><div class="text-xl font-black" id="count-all">0</div><div class="text-[10px] text-gray-500 uppercase">Всего</div></div>
            <div class="glass p-3 rounded-2xl text-center border border-yellow-500/20"><div class="text-xl font-black text-yellow-500" id="count-process">0</div><div class="text-[10px] text-gray-500 uppercase">В работе</div></div>
            <div class="glass p-3 rounded-2xl text-center border border-green-500/20"><div class="text-xl font-black text-green-500" id="count-done">0</div><div class="text-[10px] text-gray-500 uppercase">Закрыто</div></div>
        </div>

        <div class="glass rounded-3xl p-5 space-y-3">
            <h2 class="font-bold mb-2">Добавить клиента</h2>
            <input type="text" id="name" placeholder="ФИО Клиента" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none focus:border-red-500">
            <input type="tel" id="phone" placeholder="Телефон" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none focus:border-red-500">
            <select id="status" class="w-full bg-white/5 p-3 rounded-xl border border-white/10 outline-none">
                <option value="new">Новый</option>
                <option value="process">В работе</option>
                <option value="done">Завершено</option>
            </select>
            <button onclick="addClient()" class="w-full bg-red-600 py-3.5 rounded-xl font-bold active:scale-95 transition">СОХРАНИТЬ</button>
        </div>

        <div id="list" class="space-y-3"></div>
    </div>

    <script>
        let clients = JSON.parse(localStorage.getItem('crm_data')) || [];

        function addClient() {
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const status = document.getElementById('status').value;
            if(!name || !phone) return alert("Заполните поля!");
            
            clients.unshift({ id: Date.now(), name, phone, status, date: new Date().toLocaleDateString() });
            localStorage.setItem('crm_data', JSON.stringify(clients));
            render();
        }

        function exportToCSV() {
            let csv = "ФИО,Телефон,Статус,Дата\n";
            clients.forEach(c => csv += `${c.name},${c.phone},${c.status},${c.date}\n`);
            const blob = new Blob(["\ufeff" + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "clients_report.csv";
            link.click();
        }

        function render() {
            const list = document.getElementById('list');
            list.innerHTML = clients.map(c => `
                <div class="glass p-4 rounded-2xl flex justify-between items-center">
                    <div>
                        <div class="font-bold">${c.name}</div>
                        <div class="text-xs text-gray-400">${c.phone} • ${c.status}</div>
                    </div>
                    <button onclick="del(${c.id})" class="text-red-500"><i class="fa-solid fa-trash"></i></button>
                </div>
            `).join('');
            document.getElementById('count-all').innerText = clients.length;
            document.getElementById('count-process').innerText = clients.filter(c => c.status === 'process').length;
            document.getElementById('count-done').innerText = clients.filter(c => c.status === 'done').length;
        }

        function del(id) { clients = clients.filter(c => c.id !== id); localStorage.setItem('crm_data', JSON.stringify(clients)); render(); }
        render();
    </script>
</body>
</html>
